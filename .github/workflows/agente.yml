name: Agente de Conteudo — ciclo semanal

on:
  schedule:
    # 08h UTC = 05h BRT, toda segunda-feira (secao 3 da especificacao)
    - cron: "0 8 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Rodar em modo dry-run (nao publica nada, apenas gera e imprime o plano)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  run-agente:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar o pipeline (execucao agendada / manual)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          KILL_SWITCH: ${{ secrets.KILL_SWITCH }}
        run: python run.py

      - name: Rodar o pipeline (dry-run manual)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          METRICOOL_USER_TOKEN: ${{ secrets.METRICOOL_USER_TOKEN }}
          METRICOOL_USER_ID: ${{ secrets.METRICOOL_USER_ID }}
          METRICOOL_BLOG_ID: ${{ secrets.METRICOOL_BLOG_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL: ${{ secrets.REPORT_EMAIL }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          KILL_SWITCH: ${{ secrets.KILL_SWITCH }}
        run: python run.py --dry-run

      - name: Commit do estado atualizado (state/*.json)
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.dry_run != true }}
        run: |
          git config user.name "agente-conteudo-bot"
          git config user.email "actions@github.com"
          git add state/history.json state/scheduled.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(state): atualiza estado do ciclo $(date -u +%Y-%m-%d)"
            git push
          else
            echo "Nenhuma mudanca de estado para commitar."
          fi
